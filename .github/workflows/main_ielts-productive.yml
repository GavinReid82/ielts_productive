name: Build and deploy Python app to Azure Web App - ielts-productive

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Log in to Azure CLI
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Clean and prepare deployment package
        run: |
          # Remove unnecessary files
          find . -name "*.pyc" -delete
          find . -name "__pycache__" -type d -exec rm -r {} +
          find . -name ".DS_Store" -delete
          rm -rf .git .github venv local_backup.dump

      - name: Deploy to Azure Web App
        run: |
          zip -r app.zip ./* -x "venv/*"
          az webapp deploy --resource-group ielts-productive-group \
                         --name ielts-productive \
                         --src-path app.zip \
                         --type zip \
                         --async false \
                         --timeout 1800